<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Uzbekistan Schools Map — ISHONCH</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Georgia', serif;
      /* Prevent iOS bounce scroll interfering with the map */
      overflow: hidden;
      position: fixed;
    }

    :root {
      --teal:       #1e6b72;
      --teal-dark:  #134e54;
      --teal-light: #e8f4f5;
      --white:      #ffffff;
      --text-muted: #6b8e92;
      --border:     rgba(30, 107, 114, 0.25);
    }

    #map-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--teal-light);
      /* Let touch events pass through to Leaflet */
      touch-action: none;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ── Marker ── */
    .custom-marker {
      width: 11px;
      height: 11px;
      background: var(--teal);
      border: 2px solid var(--white);
      border-radius: 50%;
      box-shadow: 0 0 0 1.5px var(--teal), 0 2px 6px rgba(30,107,114,0.35);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    /* Bigger tap target on mobile */
    @media (max-width: 768px) {
      .custom-marker {
        width: 14px;
        height: 14px;
      }
    }

    .custom-marker:hover,
    .custom-marker:active {
      transform: scale(1.55);
      background: var(--teal-dark);
    }

    /* ── Tooltip ── */
    .leaflet-tooltip {
      background: var(--white) !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      box-shadow: 0 4px 16px rgba(30,107,114,0.15) !important;
      padding: 9px 13px !important;
      color: var(--teal-dark) !important;
      font-family: 'Georgia', serif !important;
      white-space: nowrap !important;
    }

    .leaflet-tooltip-right::before { border-right-color: var(--border) !important; }
    .leaflet-tooltip-left::before  { border-left-color:  var(--border) !important; }

    .tooltip-school {
      font-size: 13px;
      font-weight: bold;
      color: var(--teal-dark);
      letter-spacing: 0.03em;
    }

    .tooltip-city {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .tooltip-coords {
      font-size: 9px;
      color: #b0c8cb;
      margin-top: 4px;
      font-style: italic;
    }

    /* Hide coords on small screens to keep tooltip compact */
    @media (max-width: 768px) {
      .tooltip-coords { display: none; }
      .tooltip-school { font-size: 12px; }
    }

    /* ── Zoom controls ── */
    .leaflet-control-zoom a {
      background: var(--white) !important;
      color: var(--teal) !important;
      border-color: var(--border) !important;
      font-weight: bold;
    }

    .leaflet-control-zoom a:hover {
      background: var(--teal-light) !important;
      color: var(--teal-dark) !important;
    }

    /* Larger zoom buttons on mobile */
    @media (max-width: 768px) {
      .leaflet-control-zoom a {
        width: 36px !important;
        height: 36px !important;
        line-height: 36px !important;
        font-size: 18px !important;
      }
    }

    /* ── Attribution ── */
    .leaflet-control-attribution {
      background: rgba(255,255,255,0.75) !important;
      color: #9bb5b8 !important;
      font-size: 9px;
    }

    .leaflet-control-attribution a { color: var(--teal) !important; }
  </style>
</head>
<body>
  <div id="map-wrapper">
    <div id="map"></div>
  </div>

  <script>
    const locations = [
      { city: "Nukus city",           school: "School No. 8",   lat: 42.505230, lng: 59.600261 },
      { city: "Nukus city",           school: "School No. 34",  lat: 42.447397, lng: 59.641398 },
      { city: "Beruniy district",     school: "School No. 36",  lat: 41.743003, lng: 60.699254 },
      { city: "Takhtakupir district", school: "School No. 5",   lat: 41.655380, lng: 60.670400 },
      { city: "Muynak district",      school: "School No. 3",   lat: 40.428266, lng: 71.520162 },
      { city: "Andijan city",         school: "School No. 17",  lat: 41.528888, lng: 60.352773 },
      { city: "Asaka district",       school: "School No. 60",  lat: 40.661680, lng: 72.236365 },
      { city: "Buston district",      school: "School No. 3",   lat: 40.676174, lng: 71.987403 },
      { city: "Ulugnor district",     school: "School No. 1",   lat: 40.746800, lng: 71.709720 },
      { city: "Bukhara city",         school: "School No. 45",  lat: 39.784525, lng: 64.415234 },
      { city: "Kagan city",           school: "School No. 3",   lat: 39.722511, lng: 64.555857 },
      { city: "Romitan district",     school: "IDUM No. 1",     lat: 39.933053, lng: 64.386546 },
      { city: "Karshi city",          school: "School No. 8",   lat: 38.878098, lng: 65.809150 },
      { city: "Karshi district",      school: "School No. 65",  lat: 38.827209, lng: 65.724735 },
      { city: "Guzar district",       school: "School No. 34",  lat: 38.758073, lng: 65.129322 },
      { city: "Shakhrisabz district", school: "School No. 20",  lat: 38.915902, lng: 65.255419 },
      { city: "Zafarabad district",   school: "School No. 18",  lat: 40.228976, lng: 68.086318 },
      { city: "Gallaorol district",   school: "School No. 47",  lat: 39.973247, lng: 67.506508 },
      { city: "Jizzakh city",         school: "School No. 1",   lat: 40.107597, lng: 67.821702 },
      { city: "Navoi city",           school: "School No. 5",   lat: 40.077050, lng: 65.388470 },
      { city: "Karmana district",     school: "School No. 21",  lat: 40.155720, lng: 65.482836 },
      { city: "Kyzyltepa district",   school: "School No. 41",  lat: 40.037308, lng: 64.831881 },
      { city: "Uchkurgan district",   school: "School No. 10",  lat: 41.005240, lng: 72.004986 },
      { city: "Pop district",         school: "School No. 1",   lat: 40.874873, lng: 71.102557 },
      { city: "Chust district",       school: "School No. 58",  lat: 41.112887, lng: 71.237639 },
      { city: "Samarkand city",       school: "School No. 13",  lat: 39.661418, lng: 66.936056 },
      { city: "Akdarya district",     school: "IDUM No. 47",    lat: 39.876060, lng: 66.749489 },
      { city: "Jambay district",      school: "School No. 23",  lat: 39.692736, lng: 67.088754 },
      { city: "Angor district",       school: "School No. 24",  lat: 37.511750, lng: 67.416990 },
      { city: "Shurchi district",     school: "IDUM No. 36",    lat: 38.010554, lng: 67.792546 },
      { city: "Termez district",      school: "School No. 5",   lat: 37.263023, lng: 67.255349 },
      { city: "Termez district",      school: "School No. 2",   lat: 37.214989, lng: 67.276844 },
      { city: "Termez district",      school: "School No. 3",   lat: 37.225428, lng: 67.271448 },
      { city: "Bayaut district",      school: "School No. 17",  lat: 40.421799, lng: 68.998833 },
      { city: "Gulistan district",    school: "School No. 7",   lat: 40.503978, lng: 68.776811 },
      { city: "Syrdarya district",    school: "School No. 1",   lat: 40.837534, lng: 68.663226 },
      { city: "Bekabad city",         school: "School No. 17",  lat: 40.863931, lng: 69.586714 },
      { city: "Pskent district",      school: "School No. 8",   lat: 40.908279, lng: 69.340285 },
      { city: "Akkurgan district",    school: "School No. 18",  lat: 40.883449, lng: 69.063498 },
      { city: "Besharyk district",    school: "School No. 44",  lat: 40.342115, lng: 70.668663 },
      { city: "Altyaryk district",    school: "School No. 29",  lat: 40.502747, lng: 71.435771 },
      { city: "Dangara district",     school: "School No. 34",  lat: 40.725995, lng: 70.920596 },
      { city: "Uzbekistan district",  school: "School No. 24",  lat: 40.370923, lng: 70.824934 },
      { city: "Furkat district",      school: "School No. 26",  lat: 40.531611, lng: 70.813951 },
      { city: "Urgench district",     school: "School No. 16",  lat: 41.553933, lng: 60.607377 },
      { city: "Urgench district",     school: "School No. 2",   lat: 41.585158, lng: 60.613427 },
      { city: "Khiva city",           school: "School No. 5",   lat: 41.377952, lng: 60.349437 },
      { city: "Khazarasp district",   school: "School No. 25",  lat: 41.303772, lng: 61.114052 },
      { city: "Sergeli district",     school: "School No. 266", lat: 41.247517, lng: 69.291287 },
      { city: "Uchtepa district",     school: "School No. 287", lat: 41.277434, lng: 69.166148 },
    ];

    const isMobile = window.innerWidth <= 768;

    const uzbekBounds = L.latLngBounds(
      L.latLng(37.0, 56.0),
      L.latLng(45.5, 73.5)
    );

    const map = L.map('map', {
      center: [41.3, 64.5],
      zoom: isMobile ? 5 : 6,
      minZoom: isMobile ? 4 : 5,
      maxZoom: 13,
      maxBounds: uzbekBounds,
      maxBoundsViscosity: 1.0,
      zoomControl: true,
      // Mobile touch handling
      tap: true,
      tapTolerance: 15,
      touchZoom: true,
      bounceAtZoomLimits: false,
      // Disable scroll-wheel zoom so the map doesn't hijack page scrolling
      scrollWheelZoom: false,
    });

    // Re-enable scroll zoom only when the map is focused (clicked/tapped)
    map.on('click', () => map.scrollWheelZoom.enable());
    map.on('blur',  () => map.scrollWheelZoom.disable());

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    const markerIcon = L.divIcon({
      className: '',
      html: '<div class="custom-marker"></div>',
      iconSize: [isMobile ? 14 : 11, isMobile ? 14 : 11],
      iconAnchor: [isMobile ? 7 : 5.5, isMobile ? 7 : 5.5],
      tooltipAnchor: [10, 0],
    });

    locations.forEach(({ city, school, lat, lng }) => {
      const marker = L.marker([lat, lng], { icon: markerIcon }).addTo(map);

      if (isMobile) {
        // On mobile, show tooltip on tap (click) as a popup-style interaction
        marker.bindTooltip(`
          <div class="tooltip-school">${school}</div>
          <div class="tooltip-city">${city}</div>
        `, {
          direction: 'top',
          permanent: false,
          sticky: false,
          opacity: 1,
          offset: [0, -8],
        });
      } else {
        // On desktop, show on hover
        marker.bindTooltip(`
          <div class="tooltip-school">${school}</div>
          <div class="tooltip-city">${city}</div>
          <div class="tooltip-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
        `, {
          direction: 'right',
          permanent: false,
          sticky: false,
          opacity: 1,
        });
      }
    });

    const bounds = L.latLngBounds(locations.map(l => [l.lat, l.lng]));
    map.fitBounds(bounds, { padding: isMobile ? [20, 20] : [50, 50] });
  </script>
</body>
</html>
