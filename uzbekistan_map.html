<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Uzbekistan Map — ISHONCH</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    :root {
      --teal:       #1e6b72;
      --teal-dark:  #134e54;
      --teal-light: #e8f4f5;
      --yellow:     #f5c842;
      --yellow-dark:#c9a020;
      --white:      #ffffff;
      --text-muted: #6b8e92;
      --border:     rgba(30, 107, 114, 0.25);
      --purple:     #5b6abf;
      --purple-dark:#3a4899;
    }

    #map {
      width: 100%;
      height: 100%;
      background: var(--teal-light);
      touch-action: none;
    }

    /* ── Toggle bar ── */
    #toggle-bar {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 6px;
      background: var(--white);
      padding: 5px;
      border-radius: 30px;
      box-shadow: 0 2px 12px rgba(30,107,114,0.18);
    }

    #toggle-bar button {
      border: none;
      border-radius: 24px;
      padding: 7px 16px;
      font-size: 12px;
      font-family: 'Georgia', serif;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      background: transparent;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #toggle-bar button.active {
      color: var(--white);
    }

    #toggle-bar button#btn-all.active    { background: var(--teal); }
    #toggle-bar button#btn-schools.active { background: var(--teal); }
    #toggle-bar button#btn-clinics.active { background: var(--yellow-dark); }
    #toggle-bar button#btn-training.active { background: var(--purple-dark); }

    #toggle-bar button:hover:not(.active) {
      background: var(--teal-light);
      color: var(--teal-dark);
    }

    /* Colour swatches inside buttons */
    .swatch {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
      border: 1.5px solid rgba(0,0,0,0.12);
    }

    .swatch-teal   { background: var(--teal); }
    .swatch-yellow { background: var(--yellow); }
    .swatch-purple { background: var(--purple); }

    @media (max-width: 480px) {
      #toggle-bar {
        flex-wrap: wrap;
        justify-content: center;
        border-radius: 14px;
        gap: 4px;
        padding: 5px;
        /* Limit width so it doesn't touch screen edges */
        max-width: calc(100vw - 28px);
      }
      #toggle-bar button {
        padding: 6px 10px;
        font-size: 10px;
        letter-spacing: 0.02em;
        flex: 1 1 auto;
        text-align: center;
      }
      .swatch {
        width: 6px;
        height: 6px;
        margin-right: 3px;
      }
    }

    /* ── Markers ── */
    .marker-school, .marker-clinic, .marker-training {
      border-radius: 50%;
      border: 2px solid var(--white);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .marker-school {
      width: 11px; height: 11px;
      background: var(--teal);
      box-shadow: 0 0 0 1.5px var(--teal), 0 2px 6px rgba(30,107,114,0.35);
    }

    .marker-clinic {
      width: 11px; height: 11px;
      background: var(--yellow);
      box-shadow: 0 0 0 1.5px var(--yellow-dark), 0 2px 6px rgba(197,160,32,0.35);
    }

    .marker-training {
      width: 11px; height: 11px;
      background: var(--purple);
      box-shadow: 0 0 0 1.5px var(--purple-dark), 0 2px 6px rgba(91,106,191,0.35);
    }

    .marker-school:hover,  .marker-school:active,
    .marker-clinic:hover,  .marker-clinic:active,
    .marker-training:hover, .marker-training:active {
      transform: scale(1.55);
    }

    @media (max-width: 768px) {
      .marker-school, .marker-clinic, .marker-training { width: 14px; height: 14px; }
    }

    /* ── Tooltips ── */
    .leaflet-tooltip {
      background: var(--white) !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      box-shadow: 0 4px 16px rgba(30,107,114,0.15) !important;
      padding: 9px 13px !important;
      font-family: 'Georgia', serif !important;
      white-space: normal !important;
      max-width: 260px !important;
    }

    .leaflet-tooltip-right::before { border-right-color: var(--border) !important; }
    .leaflet-tooltip-left::before  { border-left-color:  var(--border) !important; }
    .leaflet-tooltip-top::before   { border-top-color:   var(--border) !important; }

    .tt-title {
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.03em;
    }

    .tt-school   .tt-title { color: var(--teal-dark); }
    .tt-clinic   .tt-title { color: var(--yellow-dark); }
    .tt-training .tt-title { color: var(--purple-dark); }

    .tt-sub {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .tt-coords {
      font-size: 9px;
      color: #b0c8cb;
      margin-top: 4px;
      font-style: italic;
    }

    @media (max-width: 768px) {
      .tt-coords { display: none; }
      .tt-title  { font-size: 12px; }
    }

    /* ── Zoom controls ── */
    .leaflet-control-zoom a {
      background: var(--white) !important;
      color: var(--teal) !important;
      border-color: var(--border) !important;
      font-weight: bold;
    }

    .leaflet-control-zoom a:hover {
      background: var(--teal-light) !important;
      color: var(--teal-dark) !important;
    }

    @media (max-width: 768px) {
      .leaflet-control-zoom a {
        width: 36px !important;
        height: 36px !important;
        line-height: 36px !important;
        font-size: 18px !important;
      }
    }

    /* ── Attribution ── */
    .leaflet-control-attribution {
      background: rgba(255,255,255,0.75) !important;
      color: #9bb5b8 !important;
      font-size: 9px;
    }

    .leaflet-control-attribution a { color: var(--teal) !important; }
  </style>
</head>

      { city: "Termez City",   name: "Surkhandarya Region Pedagogical Skills Center", lat: 37.239714, lng: 67.265462 },

    // ── MAP SETUP ─────────────────────────────────────────────────────────────
    const uzbekBounds = L.latLngBounds(L.latLng(37.0, 56.0), L.latLng(45.5, 73.5));

    const map = L.map('map', {
      minZoom: 4,
      maxZoom: 13,
      maxBounds: uzbekBounds,
      maxBoundsViscosity: 1.0,
      zoomControl: true,
      tap: true,
      tapTolerance: 15,
      touchZoom: true,
      bounceAtZoomLimits: false,
      scrollWheelZoom: false,
    });

    map.on('click', () => map.scrollWheelZoom.enable());
    map.on('blur',  () => map.scrollWheelZoom.disable());

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    const isMobile = window.innerWidth <= 768;
    const mSize = isMobile ? 14 : 11;
    const mAnchor = mSize / 2;

    // ── CREATE MARKER LAYERS ──────────────────────────────────────────────────
    const schoolLayer   = L.layerGroup();
    const clinicLayer   = L.layerGroup();
    const trainingLayer = L.layerGroup();

    function makeIcon(cls) {
      return L.divIcon({
        className: '',
        html: `<div class="${cls}"></div>`,
        iconSize:   [mSize, mSize],
        iconAnchor: [mAnchor, mAnchor],
        tooltipAnchor: [mSize / 2 + 3, 0],
      });
    }

    const schoolIcon   = makeIcon('marker-school');
    const clinicIcon   = makeIcon('marker-clinic');
    const trainingIcon = makeIcon('marker-training');

    schools.forEach(({ city, name, lat, lng }) => {
      const m = L.marker([lat, lng], { icon: schoolIcon });
      m.bindTooltip(`
        <div class="tt-school">
          <div class="tt-title">${name}</div>
          <div class="tt-sub">${city}</div>
          <div class="tt-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
        </div>`, {
        direction: isMobile ? 'top' : 'right',
        permanent: false,
        sticky: false,
        opacity: 1,
        offset: isMobile ? [0, -8] : [0, 0],
      });
      schoolLayer.addLayer(m);
    });

    clinics.forEach(({ name, lat, lng }) => {
      const m = L.marker([lat, lng], { icon: clinicIcon });
      m.bindTooltip(`
        <div class="tt-clinic">
          <div class="tt-title">${name}</div>
          <div class="tt-sub">Perinatal Center</div>
          <div class="tt-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
        </div>`, {
        direction: isMobile ? 'top' : 'right',
        permanent: false,
        sticky: false,
        opacity: 1,
        offset: isMobile ? [0, -8] : [0, 0],
      });
      clinicLayer.addLayer(m);
    });

    training.forEach(({ city, name, lat, lng }) => {
      const m = L.marker([lat, lng], { icon: trainingIcon });
      m.bindTooltip(`
        <div class="tt-training">
          <div class="tt-title">${name}</div>
          <div class="tt-sub">${city}</div>
          <div class="tt-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
        </div>`, {
        direction: isMobile ? 'top' : 'right',
        permanent: false,
        sticky: false,
        opacity: 1,
        offset: isMobile ? [0, -8] : [0, 0],
      });
      trainingLayer.addLayer(m);
    });

    // Add all layers by default
    schoolLayer.addTo(map);
    clinicLayer.addTo(map);
    trainingLayer.addTo(map);

    // Fit all points on load
    const allPoints = schools.map(s => [s.lat, s.lng])
      .concat(clinics.map(c => [c.lat, c.lng]))
      .concat(training.map(t => [t.lat, t.lng]));
    map.fitBounds(L.latLngBounds(allPoints), { padding: [30, 30] });

    // ── TOGGLE ────────────────────────────────────────────────────────────────
    function setFilter(mode) {
      document.querySelectorAll('#toggle-bar button').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + mode).classList.add('active');

      if (mode === 'all') {
        schoolLayer.addTo(map);
        clinicLayer.addTo(map);
        trainingLayer.addTo(map);
        map.fitBounds(L.latLngBounds(allPoints), { padding: [30, 30] });
      } else if (mode === 'schools') {
        clinicLayer.remove();
        trainingLayer.remove();
        schoolLayer.addTo(map);
        map.fitBounds(L.latLngBounds(schools.map(s => [s.lat, s.lng])), { padding: [30, 30] });
      } else if (mode === 'clinics') {
        schoolLayer.remove();
        trainingLayer.remove();
        clinicLayer.addTo(map);
        map.fitBounds(L.latLngBounds(clinics.map(c => [c.lat, c.lng])), { padding: [30, 30] });
      } else if (mode === 'training') {
        schoolLayer.remove();
        clinicLayer.remove();
        trainingLayer.addTo(map);
        map.fitBounds(L.latLngBounds(training.map(t => [t.lat, t.lng])), { padding: [80, 80] });
      }
    }
