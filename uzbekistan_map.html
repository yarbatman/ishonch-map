<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uzbekistan Schools Map — ISHONCH</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Georgia', serif;
    }

    /* ISHONCH palette */
    :root {
      --teal:        #1e6b72;
      --teal-dark:   #134e54;
      --teal-light:  #e8f4f5;
      --white:       #ffffff;
      --text-muted:  #6b8e92;
      --border:      rgba(30, 107, 114, 0.25);
    }

    #map-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 500px;
      background: var(--teal-light);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Top-left label */
    #map-label {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 1000;
      background: var(--white);
      color: var(--teal-dark);
      padding: 9px 14px;
      border-left: 3px solid var(--teal);
      letter-spacing: 0.16em;
      font-size: 11px;
      text-transform: uppercase;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(30,107,114,0.12);
    }

    #map-label span {
      display: block;
      color: var(--text-muted);
      font-size: 9px;
      letter-spacing: 0.1em;
      margin-top: 3px;
    }

    /* Bottom-left badge */
    #point-count {
      position: absolute;
      bottom: 30px;
      left: 14px;
      z-index: 1000;
      background: var(--white);
      color: var(--teal);
      padding: 6px 12px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 2px 8px rgba(30,107,114,0.12);
      pointer-events: none;
    }

    /* Marker dot */
    .custom-marker {
      width: 11px;
      height: 11px;
      background: var(--teal);
      border: 2px solid var(--white);
      border-radius: 50%;
      box-shadow: 0 0 0 1.5px var(--teal), 0 2px 6px rgba(30,107,114,0.35);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .custom-marker:hover {
      transform: scale(1.55);
      background: var(--teal-dark);
    }

    /* Tooltip */
    .leaflet-tooltip {
      background: var(--white) !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      box-shadow: 0 4px 16px rgba(30,107,114,0.15) !important;
      padding: 9px 13px !important;
      color: var(--teal-dark) !important;
      font-family: 'Georgia', serif !important;
      font-size: 12px !important;
      white-space: nowrap !important;
    }

    /* Arrow pointing right */
    .leaflet-tooltip-right::before {
      border-right-color: var(--border) !important;
    }
    .leaflet-tooltip-left::before {
      border-left-color: var(--border) !important;
    }

    .tooltip-school {
      font-size: 13px;
      font-weight: bold;
      color: var(--teal-dark);
      letter-spacing: 0.03em;
    }

    .tooltip-city {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .tooltip-coords {
      font-size: 9px;
      color: #b0c8cb;
      margin-top: 4px;
      font-style: italic;
    }

    /* Zoom control */
    .leaflet-control-zoom a {
      background: var(--white) !important;
      color: var(--teal) !important;
      border-color: var(--border) !important;
      font-weight: bold;
    }

    .leaflet-control-zoom a:hover {
      background: var(--teal-light) !important;
      color: var(--teal-dark) !important;
    }

    /* Attribution */
    .leaflet-control-attribution {
      background: rgba(255,255,255,0.75) !important;
      color: #9bb5b8 !important;
      font-size: 9px;
    }

    .leaflet-control-attribution a {
      color: var(--teal) !important;
    }
  </style>
</head>
<body>
  <div id="map-wrapper">
    <div id="map-label">
      Uzbekistan
      <span>Schools GPS Locations</span>
    </div>
    <div id="point-count">50 locations</div>
    <div id="map"></div>
  </div>

  <script>
    const locations = [
      { city: "Nukus city",           school: "School No. 8",   lat: 42.505230, lng: 59.600261 },
      { city: "Nukus city",           school: "School No. 34",  lat: 42.447397, lng: 59.641398 },
      { city: "Beruniy district",     school: "School No. 36",  lat: 41.743003, lng: 60.699254 },

      { city: "Muynak district",      school: "School No. 3",   lat: 40.428266, lng: 71.520162 },
      { city: "Andijan city",         school: "School No. 17",  lat: 41.528888, lng: 60.352773 },

      { city: "Jizzakh city",         school: "School No. 1",   lat: 40.107597, lng: 67.821702 },

      { city: "Chust district",       school: "School No. 58",  lat: 41.112887, lng: 71.237639 },
      { city: "Samarkand city",       school: "School No. 13",  lat: 39.661418, lng: 66.936056 },
      { city: "Akdarya district",     school: "IDUM No. 47",    lat: 39.876060, lng: 66.749489 },

      { city: "Termez district",      school: "School No. 2",   lat: 37.214989, lng: 67.276844 },
      { city: "Termez district",      school: "School No. 3",   lat: 37.225428, lng: 67.271448 },
      { city: "Bayaut district",      school: "School No. 17",  lat: 40.421799, lng: 68.998833 },
      { city: "Gulistan district",    school: "School No. 7",   lat: 40.503978, lng: 68.776811 },
      { city: "Syrdarya district",    school: "School No. 1",   lat: 40.837534, lng: 68.663226 },

      { city: "Besharyk district",    school: "School No. 44",  lat: 40.342115, lng: 70.668663 },

      { city: "Dangara district",     school: "School No. 34",  lat: 40.725995, lng: 70.920596 },

      { city: "Furkat district",      school: "School No. 26",  lat: 40.531611, lng: 70.813951 },
      { city: "Urgench district",     school: "School No. 16",  lat: 41.553933, lng: 60.607377 },
      { city: "Urgench district",     school: "School No. 2",   lat: 41.585158, lng: 60.613427 },
      { city: "Khiva city",           school: "School No. 5",   lat: 41.377952, lng: 60.349437 },
      { city: "Khazarasp district",   school: "School No. 25",  lat: 41.303772, lng: 61.114052 },
      { city: "Sergeli district",     school: "School No. 266", lat: 41.247517, lng: 69.291287 },
      { city: "Uchtepa district",     school: "School No. 287", lat: 41.277434, lng: 69.166148 },
    ];

    // Uzbekistan bounding box — prevents zooming out past the country
    const uzbekBounds = L.latLngBounds(
      L.latLng(37.0, 56.0),   // SW corner
      L.latLng(45.5, 73.5)    // NE corner
    );

    const map = L.map('map', {
      center: [41.3, 64.5],
      zoom: 6,
      minZoom: 5,
      maxZoom: 13,
      maxBounds: uzbekBounds,
      maxBoundsViscosity: 1.0,   // hard stop at border
      zoomControl: true,
    });

    // Light tile layer (CartoDB Positron — clean, minimal)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    const markerIcon = L.divIcon({
      className: '',
      html: '<div class="custom-marker"></div>',
      iconSize: [11, 11],
      iconAnchor: [5.5, 5.5],
      tooltipAnchor: [8, 0],
    });

    locations.forEach(({ city, school, lat, lng }) => {
      const marker = L.marker([lat, lng], { icon: markerIcon }).addTo(map);
      marker.bindTooltip(`
        <div class="tooltip-school">${school}</div>
        <div class="tooltip-city">${city}</div>
        <div class="tooltip-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
      `, {
        direction: 'right',
        permanent: false,
        sticky: false,
        opacity: 1,
      });
    });

    // Fit to all markers on load
    const bounds = L.latLngBounds(locations.map(l => [l.lat, l.lng]));
    map.fitBounds(bounds, { padding: [50, 50] });
  </script>
</body>
</html>
